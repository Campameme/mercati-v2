<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Emblema "Mercati della Riviera di Ponente": borgo sul promontorio,
       sole, due onde di mare — su fondo notte (come LogoMark/LogoMonogram). -->
  <rect width="100" height="100" rx="22" fill="#0E3040"/>
  <!-- sole -->
  <circle cx="76" cy="26" r="8" fill="#F4B62C"/>
  <g fill="#F7EFDD">
    <!-- borgo: case di altezze diverse su una base -->
    <rect x="20" y="33" width="11" height="19"/>
    <path d="M18.5 33 L25.5 24 L32.5 33 Z"/>
    <rect x="35" y="39" width="12.5" height="13"/>
    <path d="M33.5 39 L41.25 31 L49 39 Z"/>
    <rect x="52" y="28" width="9" height="24"/>
    <path d="M50.5 28 L56.5 20.5 L62.5 28 Z"/>
    <rect x="16" y="52" width="50" height="3" rx="1.5"/>
  </g>
  <!-- mare: due onde sotto il borgo -->
  <g fill="none" stroke="#F7EFDD" stroke-width="4" stroke-linecap="round">
    <path d="M14 66 C 22 60, 29 72, 37 66 S 52 60, 59 66 S 74 72, 87 65"/>
    <path d="M14 79 C 22 73, 29 85, 37 79 S 52 73, 59 79 S 74 85, 87 78"/>
  </g>
</svg>
